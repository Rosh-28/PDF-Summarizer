<!DOCTYPE html>
<html>
<head>
  <title>MCQ Quiz</title>
  <style>
    .option-btn { margin: 5px; padding: 8px 16px; }
    .correct { background-color: #c8f7c5; }
    .incorrect { background-color: #f7c5c5; }
  </style>
</head>
<body>
  <h2 id="question">Click "Generate" to start</h2>
  <div id="options"></div>
  <p id="result"></p>
  <button onclick="fetchMCQ()">🎲 Generate New MCQ</button>

  <script>
    let correctAnswer = "";

    function fetchMCQ() {
      document.getElementById("question").innerText = "Loading...";
      document.getElementById("options").innerHTML = "";
      document.getElementById("result").innerText = "";

      fetch("/generate_mcq")
        .then(res => res.json())
        .then(data => {
          document.getElementById("question").innerText = data.question;
          correctAnswer = data.correct;

          const optionsDiv = document.getElementById("options");
          for (let key in data.options) {
            let btn = document.createElement("button");
            btn.innerText = key + ") " + data.options[key];
            btn.className = "option-btn";
            btn.onclick = () => handleAnswer(key, btn);
            optionsDiv.appendChild(btn);
          }
        });
    }

    function handleAnswer(selected, btn) {
      const result = document.getElementById("result");
      if (selected === correctAnswer) {
        result.innerText = "✅ Correct!";
        btn.classList.add("correct");
      } else {
        result.innerText = "❌ Incorrect. Correct answer: " + correctAnswer;
        btn.classList.add("incorrect");
      }

      // Disable all buttons
      const allButtons = document.querySelectorAll(".option-btn");
      allButtons.forEach(b => b.disabled = true);
    }
  </script>
</body>
</html>
